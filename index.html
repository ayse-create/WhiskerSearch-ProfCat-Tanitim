<body>

<div class="browser-container">
  
  <div class="demo-warning">
    ⚠️ Bu bir demo/tarayıcı simülasyonudur - Eğlence amaçlıdır
  </div>

  <div class="browser-header">
    <div class="browser-buttons">
      <button class="nav-button" onclick="goBack()">←</button>
      <button class="nav-button" onclick="goForward()">→</button>
      <button class="nav-button" onclick="reload()">↻</button>
    </div>
    <div class="address-bar">
      <span class="address-bar-icon">🔒</span>
      <span class="address-bar-url" id="addressBarUrl">https://ayse-create.github.io/WhiskerSearch-ProfCat</span>
    </div>
  </div>

  <div class="browser-content" id="browserContent">
    <div class="search-page" id="searchPage">
      <div class="search-logo">🐱</div>
      <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="ProfessorCat'ta ara..." onkeypress="handleSearch(event)">
        <button class="search-button" onclick="performSearch()">Ara</button>
      </div>
    </div>
  </div>

</div>

<script>
// ============================================
// TARAYICI GEÇMİŞİ SİSTEMİ
// ============================================
let historyStack = [];
let historyIndex = -1;

function pushState(page, query, content, title) {
  historyStack = historyStack.slice(0, historyIndex + 1);
  historyStack.push({ page, query, content, title });
  historyIndex = historyStack.length - 1;
  updateAddressBar(query, title);
}

function updateAddressBar(query, title) {
  const urlEl = document.getElementById('addressBarUrl');
  if (!urlEl) return;
  if (query) {
    urlEl.textContent = `https://ayse-create.github.io/WhiskerSearch-ProfCat/search?q=${encodeURIComponent(query)}`;
  } else if (title) {
    urlEl.textContent = `https://ayse-create.github.io/WhiskerSearch-ProfCat/${title}`;
  } else {
    urlEl.textContent = 'https://ayse-create.github.io/WhiskerSearch-ProfCat';
  }
}

// ============================================
// GEZİNME FONKSİYONLARI
// ============================================
function goBack() {
  if (historyIndex > 0) {
    historyIndex--;
    const entry = historyStack[historyIndex];
    if (entry) {
      const box = document.getElementById('browserContent');
      box.innerHTML = entry.content;
      updateAddressBar(entry.query, entry.title);
      
      if (entry.page === 'results') {
        document.querySelectorAll('.result-item').forEach(el => {
          const onclick = el.getAttribute('onclick');
          if (onclick) el.onclick = new Function(onclick);
        });
      }
      document.querySelectorAll('.gallery-toggle').forEach(el => {
        el.onclick = function() {
          const target = this.getAttribute('data-target');
          const content = document.getElementById(target);
          const arrow = this.querySelector('.arrow');
          if (content) {
            content.classList.toggle('open');
            if (arrow) arrow.classList.toggle('open');
          }
        };
      });
    }
  } else {
    alert('🐱 Ana sayfadasınız, geri gidilecek sayfa yok!');
  }
}

function goForward() {
  if (historyIndex < historyStack.length - 1) {
    historyIndex++;
    const entry = historyStack[historyIndex];
    if (entry) {
      const box = document.getElementById('browserContent');
      box.innerHTML = entry.content;
      updateAddressBar(entry.query, entry.title);
      
      if (entry.page === 'results') {
        document.querySelectorAll('.result-item').forEach(el => {
          const onclick = el.getAttribute('onclick');
          if (onclick) el.onclick = new Function(onclick);
        });
      }
      document.querySelectorAll('.gallery-toggle').forEach(el => {
        el.onclick = function() {
          const target = this.getAttribute('data-target');
          const content = document.getElementById(target);
          const arrow = this.querySelector('.arrow');
          if (content) {
            content.classList.toggle('open');
            if (arrow) arrow.classList.toggle('open');
          }
        };
      });
    }
  } else {
    alert('🐱 İleri gidilecek sayfa yok!');
  }
}

function reload() {
  location.reload();
}

// ============================================
// ANA SAYFA
// ============================================
function goHome() {
  const box = document.getElementById('browserContent');
  if (!box) return;
  
  const content = `
    <div class="search-page" id="searchPage">
      <div class="search-logo">🐱</div>
      <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="ProfessorCat'ta ara..." onkeypress="handleSearch(event)">
        <button class="search-button" onclick="performSearch()">Ara</button>
      </div>
    </div>
  `;
  
  box.innerHTML = content;
  pushState('home', '', content, '');
  
  setTimeout(() => {
    const input = document.getElementById('searchInput');
    if (input) input.focus();
  }, 100);
}

// ============================================
// ARAMA FONKSİYONLARI
// ============================================
let lastSearchQuery = '';

function handleSearch(event) {
  if (event.key === 'Enter') performSearch();
}

function performSearch(query) {
  const input = document.getElementById('searchInput');
  
  if (query !== undefined) {
    if (input) input.value = query;
    lastSearchQuery = query.toLowerCase();
  } else {
    if (!input) return;
    const q = input.value.trim();
    if (!q) return;
    lastSearchQuery = q.toLowerCase();
  }

  showResults();
}

function showResults() {
  const box = document.getElementById('browserContent');
  if (!box) return;

  let results = [];
  let pageTitle = '';

  // 1. WhiskerSearch Nedir?
  if (lastSearchQuery.includes("whiskersearch") && 
      (lastSearchQuery.includes("nedir") || lastSearchQuery.includes("ne") || lastSearchQuery.includes("hakkında"))) {
    results.push({
      title: "🐱 WhiskerSearch Nedir?",
      url: "whiskersearch.com › hakkında",
      desc: "ProfessorCat tarafından işlenen eğlenceli arama deneyimi. Ödev, çevre, restoran ve ev düzenleme oyunlarıyla dolu bir dünya.",
      action: "openInfo"
    });
    pageTitle = 'WhiskerSearch Nedir?';
  }

  // 2. Diğer Sayfalar (5 sonuç)
  if (lastSearchQuery.includes("diğer sayfalar") || 
      lastSearchQuery.includes("sayfalar") ||
      (lastSearchQuery.includes("whiskersearch") && lastSearchQuery.includes("sayfa"))) {
    results.push(
      {
        title: "🖥️ Terminal Sistemi",
        url: "whiskersearch.com › terminal",
        desc: "Klavye komutlarıyla çalışan, gizli içeriklerin keşfedildiği terminal deneyimi.",
        action: "openTerminal"
      },
      {
        title: "❓ 404 Sayfası",
        url: "whiskersearch.com › 404",
        desc: "Kaybolmuş pati izlerinin peşinde... WhiskerSearch'ün eğlenceli 404 hata sayfası teması.",
        action: "open404"
      },
      {
        title: "📧 İletişim Sayfası",
        url: "whiskersearch.com › contact",
        desc: "Hızlı iletişim için 'İletişim Kur' butonu ile e-posta gönderme sistemi.",
        action: "openContact"
      },
      {
        title: "⭐ Feedback (Geri Bildirim)",
        url: "whiskersearch.com › feedback",
        desc: "Kedi slider ile puanlama, yorumlar ve Google Sheets entegrasyonu.",
        action: "openFeedback"
      },
      {
        title: "🤖 Cat-AI",
        url: "whiskersearch.com › cat-ai",
        desc: "Henüz Türkçe'yi öğrenen ama matematikte başarılı yapay zeka asistanı.",
        action: "openCatAI"
      }
    );
    pageTitle = 'Diğer Sayfalar';
  }

  // 3. Performans İstatistikleri
  if (lastSearchQuery.includes("performans") || 
      lastSearchQuery.includes("istatistik") || 
      lastSearchQuery.includes("google") || 
      lastSearchQuery.includes("gsc") ||
      lastSearchQuery.includes("business")) {
    results.push({
      title: "📊 Performans İstatistikleri",
      url: "whiskersearch.com › istatistik",
      desc: "Google Search Console verileri: 36 Tıklanma, 95 Gösterim, %37,9 CTR, Ortalama Konum 1,3. Google Business entegrasyonu.",
      action: "openStats"
    });
    pageTitle = 'Performans İstatistikleri';
  }

  // 4. Kaynakça
  if (lastSearchQuery.includes("kaynakça") || 
      lastSearchQuery.includes("referans") ||
      lastSearchQuery.includes("kaynak")) {
    results.push({
      title: "📚 Kaynakça / Referanslar",
      url: "whiskersearch.com › kaynakca",
      desc: "WhiskerSearch-ProfCat projesinde kullanılan kaynaklar, teknolojiler ve ilham alınan çalışmalar.",
      action: "openReferences"
    });
    pageTitle = 'Kaynakça';
  }

  // Eğer hiçbir sonuç bulunamazsa
  if (results.length === 0) {
    results.push({
      title: "🐾 Sonuç bulunamadı",
      url: "whiskersearch.com › arama",
      desc: "ProfessorCat bu konuyu henüz keşfetmedi. Farklı bir kelime deneyin miyav!",
      action: "goHome"
    });
    pageTitle = 'Sonuç bulunamadı';
  }

  // Sonuçları ekrana yaz
  let html = '<div class="results-container" id="resultsContainer">';
  results.forEach(r => {
    html += `
      <div class="result-item" onclick="${r.action}()">
        <div class="result-url">${r.url}</div>
        <div class="result-title">${r.title}</div>
        <div class="result-description">${r.desc}</div>
      </div>
    `;
  });
  html += '</div>';
  box.innerHTML = html;

  pushState('results', lastSearchQuery, html, pageTitle);
}

// ============================================
// KLAVYE KISAYOLLARI
// ============================================
document.addEventListener('keydown', function(e) {
  const key = e.key;
  
  if (e.target && e.target.tagName === 'INPUT') {
    return;
  }

  switch(key) {
    case '1':
      e.preventDefault();
      e.stopPropagation();
      performSearch('whiskersearch nedir');
      break;
    case '2':
      e.preventDefault();
      e.stopPropagation();
      performSearch('whiskersearch diğer sayfalar');
      break;
    case '3':
      e.preventDefault();
      e.stopPropagation();
      performSearch('performans istatistikleri');
      break;
    case '4':
      e.preventDefault();
      e.stopPropagation();
      performSearch('kaynakça');
      break;
    case '0':
      e.preventDefault();
      e.stopPropagation();
      goHome();
      break;
  }
}, true);

// ============================================
// SAYFA İÇERİKLERİ
// ============================================

      <div style="text-align:center; padding:20px 0; border-top:2px solid #eee; margin-top:20px;">

      </div>
    </div>
  `;
  
  const box = document.getElementById('browserContent');
  box.innerHTML = content;
  pushState('info', 'whiskersearch nedir', content, 'whiskersearch');
  
  document.querySelectorAll('.gallery-toggle').forEach(el => {
    el.onclick = function() {
      const target = this.getAttribute('data-target');
      const content = document.getElementById(target);
      const arrow = this.querySelector('.arrow');
      if (content) {
        content.classList.toggle('open');
        if (arrow) arrow.classList.toggle('open');
      }
    };
  });
}
